apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "muthur-collector.fullname" . }}-config
  labels:
    {{- include "muthur-collector.labels" . | nindent 4 }}
data:
  CLUSTER_ID: {{ .Values.config.clusterId | quote }}
  LOKI_URL: {{ .Values.config.lokiUrl | quote }}
  LOKI_LOOKBACK_MINUTES: {{ .Values.config.lokiLookbackMinutes | quote }}
  LOKI_MAX_LOG_LINES: {{ .Values.config.lokiMaxLogLines | quote }}
  PROMETHEUS_URL: {{ .Values.config.prometheusUrl | quote }}
  PROMETHEUS_LOOKBACK_MINUTES: {{ .Values.config.prometheusLookbackMinutes | quote }}
  PROMETHEUS_ENABLED: {{ .Values.config.prometheusEnabled | quote }}
  LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  REDACT_LOG_STATS: {{ .Values.config.redactLogStats | quote }}
  REDACT_EXTRA_PATTERNS: {{ .Values.config.redactExtraPatterns | quote }}
  PORT: "8080"
