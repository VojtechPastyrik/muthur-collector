apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muthur-collector.fullname" . }}
  labels:
    {{- include "muthur-collector.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "muthur-collector.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
      labels:
        {{- include "muthur-collector.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "muthur-collector.fullname" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "muthur-collector.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          envFrom:
            - configMapRef:
                name: {{ include "muthur-collector.fullname" . }}-config
            - secretRef:
                name: {{ include "muthur-collector.fullname" . }}-secret
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
