name: Release

on:
  push:
    tags:
      - 'v*'
      - 'chart-v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vojtechpastyrik/muthur-collector

jobs:
  docker:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          make proto

      - run: make test

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-update:
    runs-on: ubuntu-latest
    needs: [docker]
    if: always() && (needs.docker.result == 'success' || needs.docker.result == 'skipped')
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Package chart
        run: |
          if [[ "${GITHUB_REF_NAME}" == chart-v* ]]; then
            VERSION=${GITHUB_REF_NAME#chart-v}
            helm package helm/muthur-collector --version ${VERSION}
          else
            VERSION=${GITHUB_REF_NAME#v}
            helm package helm/muthur-collector --version ${VERSION} --app-version ${VERSION}
          fi

      - name: Clone charts repo (gh-pages)
        run: |
          git clone --branch gh-pages https://x-access-token:${{ secrets.CHARTS_REPO_TOKEN }}@github.com/vojtechpastyrik/charts.git charts-repo

      - name: Update Helm repo index
        run: |
          cp muthur-collector-*.tgz charts-repo/
          cd charts-repo
          if [ -f index.yaml ]; then
            helm repo index . --url https://vojtechpastyrik.github.io/charts --merge index.yaml
          else
            helm repo index . --url https://vojtechpastyrik.github.io/charts
          fi

      - name: Commit and push
        run: |
          cd charts-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.yaml muthur-collector-*.tgz
          git diff --staged --quiet || git commit -m "muthur-collector ${GITHUB_REF_NAME}"
          git push

  github-release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [docker, helm-update]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Install

            **Docker image:**
            ```
            docker pull ghcr.io/vojtechpastyrik/muthur-collector:${{ github.ref_name }}
            ```

            **Helm chart:**
            ```
            helm repo add vojtechpastyrik https://vojtechpastyrik.github.io/charts
            helm repo update
            helm install muthur-collector vojtechpastyrik/muthur-collector --version ${{ steps.version.outputs.value }}
            ```
