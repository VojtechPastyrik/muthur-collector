name: Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vojtechpastyrik/muthur-collector

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          make proto

      - run: make test

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm-update:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: VojtechPastyrik/charts
          token: ${{ secrets.CHARTS_REPO_TOKEN }}
          path: charts-repo

      - name: Update chart version and sync files
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          SRC="helm/muthur-collector"
          DEST="charts-repo/charts/muthur-collector"
          mkdir -p ${DEST}
          cp -r ${SRC}/. ${DEST}/
          sed -i "s/^version:.*/version: ${VERSION}/" ${DEST}/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" ${DEST}/Chart.yaml
          sed -i "s/tag: .*/tag: \"${VERSION}\"/" ${DEST}/values.yaml

      - name: Commit and push
        run: |
          cd charts-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add charts/muthur-collector/
          git diff --staged --quiet || git commit -m "chore: bump muthur-collector to ${{ github.ref_name }}"
          git push
