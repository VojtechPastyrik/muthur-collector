name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate protobuf
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          make proto

      # golangci-lint disabled — no released version yet ships built with
      # Go 1.26, and the go.mod directive targets 1.26.1. Re-enable once
      # upstream publishes a 1.26-based build.
      # - uses: golangci/golangci-lint-action@v7
      #   with:
      #     version: v2.5.0

      - run: make test
