syntax = "proto3";
package monitoring.v1;
option go_package = "github.com/VojtechPastyrik/muthur-collector/proto/v1";

message AlertPayload {
  string cluster_id    = 1;
  string alert_name    = 2;
  string severity      = 3;  // critical | warning | info
  string namespace     = 4;
  string pod_name      = 5;
  int64  fired_at      = 6;  // unix timestamp seconds
  string summary       = 7;
  string description   = 8;

  AlertTarget           target    = 9;
  repeated string       redacted_logs = 10;
  repeated MetricSeries metrics   = 11;
  repeated PodMeta      pod_metas = 12;
  repeated Label        labels    = 13;

  int32 total_log_lines    = 14;
  int32 redacted_log_lines = 15;
  int32 total_replacements = 16;

  string status = 17; // firing | resolved
  string grafana_base_url = 18; // collector-provided Grafana base URL
}

message AlertTarget {
  string target_type  = 1; // pod | deployment | daemonset | node | pvc | namespace | unknown
  string pod_name     = 2;
  string deployment   = 3;
  string daemonset    = 4;
  string node         = 5;
  string pvc          = 6;
  string namespace    = 7;
  repeated string resolved_pods = 8;
}

message MetricSeries {
  string metric_name        = 1;
  string description        = 2;
  string unit               = 3;  // bytes | percent | count | seconds
  repeated DataPoint points = 4;
}

message DataPoint {
  int64  timestamp = 1;
  double value     = 2;
}

message PodMeta {
  string pod_name       = 1;
  string memory_limit   = 2;
  string memory_request = 3;
  string cpu_limit      = 4;
  string cpu_request    = 5;
  string node_name      = 6;
  int32  restart_count  = 7;
  string phase          = 8;
}

message Label {
  string name  = 1;
  string value = 2;
}
